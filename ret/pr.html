<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../responsive_assets/responsive.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Projects – Slider</title>
  <style>
    :root {
      --gold-1: #a28255;
      --gold-2: #d1b180;
      --per-view: 1;            /* mobile: 1 card per view */
      --gap: 16px;
      --radius: 14px;
      --shadow: 0 8px 24px rgba(0,0,0,.12);
      --track-h: 230px;         /* card height (can tweak) */
      --speed: 600ms;           /* slide animation */
    }

    @media (min-width: 900px) {
      :root { --per-view: 3; --track-h: 260px; }
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color: #111; background:#fff; }

    /* Section */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    #projects { padding: 80px 0; text-align: center; }

    .gradient-title {
      font-size: clamp(1.6rem, 2.2vw + 1rem, 2.25rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(to bottom, var(--gold-1), var(--gold-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
      opacity: 0;
      transform: translateY(10px);
      transition: 600ms ease;
    }
    .gradient-title.reveal { opacity: 1; transform: translateY(0); }

    /* Slider shell */
    .slider {
      position: relative;
      margin-top: 36px;
    }

    /* Progress bar */
    .progress {
      position: absolute; top: -8px; left: 0; right: 0; height: 3px; background: rgba(0,0,0,.08); overflow: hidden; border-radius: 999px;
    }
    .progress > i {
      display:block; height:100%; width:0%;
      background:#111; transition: width linear;
    }

    /* Track (scroll-snap) */
    .track {
      display: flex;
      gap: var(--gap);
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      padding-bottom: 6px;
      -webkit-overflow-scrolling: touch;
    }
    .track::-webkit-scrollbar { height: 10px; }
    .track::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 999px; }
    .track::-webkit-scrollbar-track { background: rgba(0,0,0,.05); border-radius: 999px; }

    .card {
      scroll-snap-align: start;
      flex: 0 0 calc((100% - (var(--gap) * (var(--per-view) - 1))) / var(--per-view));
      height: var(--track-h);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: #e5e7eb; /* gray-200 */
      display: grid;
      place-items: center;
      font-weight: 600;
      color: #111;
      user-select: none;
      position: relative;
      overflow: hidden;
      transform: translateY(12px);
      opacity: 0;
      transition: transform 700ms ease, opacity 700ms ease;
    }
    .card.reveal { transform: translateY(0); opacity: 1; }

    /* Image demo styles */
    .card::before {
      content: attr(data-label);
      position: absolute; inset: 0;
      display:grid; place-items:center;
      background:
        linear-gradient(180deg, rgba(0,0,0,.0), rgba(0,0,0,.25));
      color: white; font-weight: 700; letter-spacing:.2px;
      text-shadow: 0 2px 10px rgba(0,0,0,.35);
    }
    .card[data-img] {
      background: #ccc center/cover no-repeat;
    }

    /* Arrows */
    .arrow {
      position: absolute; inset: 0; pointer-events: none;
    }
    .arrow button {
      pointer-events: auto;
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border: 0; border-radius: 999px;
      background: rgba(0,0,0,.45); color:#fff; display:grid; place-items:center;
      cursor: pointer; transition: background .2s ease, transform .2s ease;
      backdrop-filter: blur(6px);
    }
    .arrow button:hover { background: rgba(0,0,0,.65); transform: translateY(-50%) scale(1.04); }
    .arrow .prev { left: 8px; }
    .arrow .next { right: 8px; }

    /* Dots */
    .dots {
      margin-top: 16px; display:flex; gap:8px; justify-content:center; align-items:center;
    }
    .dots button {
      width: 10px; height: 10px; border-radius: 999px; border:0; background: rgba(0,0,0,.3); cursor: pointer;
      transition: width .25s ease, background .25s ease;
    }
    .dots button.active { width: 28px; background:#111; }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      .track { scroll-behavior: auto; }
      .card, .gradient-title { transition: none; transform: none !important; opacity: 1 !important; }
      .progress { display: none; }
    }
    
  </style>
</head>
<body>

  <!-- Projects -->
  <section id="projects">
    <div class="container">
      <h3 class="gradient-title" id="projectsTitle">Our Projects</h3>

      <div class="slider" id="projectsSlider" aria-roledescription="carousel" aria-label="Projects carousel">
        <div class="progress" aria-hidden="true"><i id="progressFill"></i></div>

        <!-- Track -->
        <div class="track" id="track">
          <!-- Replace with your images: set data-img to an image URL and remove the ::before label if you want pure images -->
          <div class="card" data-img="https://images.unsplash.com/photo-1522075469751-3a6694fb2f61?q=80&w=1800&auto=format&fit=crop" style="background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c')" data-label="Project Image 1" role="group" aria-roledescription="slide" aria-label="1 of 6"></div>

          <div class="card" data-img="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1800&auto=format&fit=crop" style="background-image:url('bg3.jpg')" data-label="Project Image 2" role="group" aria-roledescription="slide" aria-label="2 of 6"></div>

          <div class="card" data-img="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1800&auto=format&fit=crop" style="background-image:url('er.jpg')" data-label="Project Image 3" role="group" aria-roledescription="slide" aria-label="3 of 6"></div>

          <div class="card" data-img="https://images.unsplash.com/photo-1556157382-97eda2d62296?q=80&w=1800&auto=format&fit=crop" style="background-image:url('sa.jpg')" data-label="Project Image 4" role="group" aria-roledescription="slide" aria-label="4 of 6"></div>

        </div>

        <!-- Arrows -->
        <div class="arrow" aria-hidden="true">
          <button class="prev" id="prevBtn" aria-label="Previous">
            <!-- left chevron -->
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
          </button>
          <button class="next" id="nextBtn" aria-label="Next">
            <!-- right chevron -->
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="m8.59 16.59 1.41 1.41 6-6-6-6-1.41 1.41L13.17 12z"/></svg>
          </button>
        </div>
      </div>

      <!-- Dots -->
      <div class="dots" id="dots" aria-label="Slide navigation"></div>
    </div>
  </section>

  <script>
    (function () {
      const root = getComputedStyle(document.documentElement);
      const perView = parseInt(root.getPropertyValue('--per-view')) || 1;
      const gap = parseInt(root.getPropertyValue('--gap')) || 16;
      const track = document.getElementById('track');
      const cards = Array.from(track.children);
      const prev = document.getElementById('prevBtn');
      const next = document.getElementById('nextBtn');
      const dotsWrap = document.getElementById('dots');
      const progressFill = document.getElementById('progressFill');
      const title = document.getElementById('projectsTitle');

      // Reveal effects like AOS
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) e.target.classList.add('reveal');
        });
      }, { threshold: 0.2 });
      io.observe(title);
      cards.forEach(c => io.observe(c));

      // Compute pages (how many "slides" to show)
      const totalPages = Math.max(1, Math.ceil(cards.length / perView));
      let page = 0;

      // Build dots
      const dots = [];
      for (let i = 0; i < totalPages; i++) {
        const b = document.createElement('button');
        if (i === 0) b.classList.add('active');
        b.addEventListener('click', () => goTo(i));
        dotsWrap.appendChild(b);
        dots.push(b);
      }

      function updateDots(p) {
        dots.forEach((d, i) => d.classList.toggle('active', i === p));
      }

      function pageWidth() {
        // width to scroll equals track width (minus a tiny epsilon to land snap)
        return track.clientWidth + gap;
      }

      function goTo(p) {
        page = (p + totalPages) % totalPages;
        const x = page * pageWidth();
        track.scrollTo({ left: x, behavior: 'smooth' });
        updateDots(page);
        resetProgressAnim();
      }

      // Arrows
      prev.addEventListener('click', () => goTo(page - 1));
      next.addEventListener('click', () => goTo(page + 1));

      // Keyboard
      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') goTo(page - 1);
        if (e.key === 'ArrowRight') goTo(page + 1);
      });

      // Sync page when user scrolls/swipes
      let scrollTimeout;
      track.addEventListener('scroll', () => {
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
          const p = Math.round(track.scrollLeft / pageWidth());
          if (p !== page) {
            page = p;
            updateDots(page);
            resetProgressAnim();
          }
        }, 80);
      });

      // Autoplay with pause-on-hover
      const AUTOPLAY_MS = 5000;
      let timer = null;
      let paused = false;

      function play() {
        stop();
        timer = setInterval(() => goTo(page + 1), AUTOPLAY_MS);
        animateProgress();
      }
      function stop() {
        if (timer) clearInterval(timer);
        timer = null;
        progressFill.style.transition = 'none';
      }

      function animateProgress() {
        progressFill.style.transition = 'none';
        // restart
        progressFill.getBoundingClientRect(); // force reflow
        progressFill.style.width = '0%';
        progressFill.style.transition = `width ${AUTOPLAY_MS}ms linear`;
        requestAnimationFrame(() => { progressFill.style.width = paused ? '0%' : '100%'; });
      }
      function resetProgressAnim() {
        if (!timer) return;
        animateProgress();
      }

      const slider = document.getElementById('projectsSlider');
      slider.addEventListener('mouseenter', () => { paused = true; stop(); progressFill.style.width = '0%'; });
      slider.addEventListener('mouseleave', () => { paused = false; play(); });

      // Resize handling (recompute position)
      window.addEventListener('resize', () => goTo(page));

      // Init
      play();
    })();
  </script>
</body>
</html>
